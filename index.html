<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title data-i18n="title">Image Overlay Compare</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="header-text">
      <h1 data-i18n="title">Image Overlay Compare</h1>
      <p class="subtitle" data-i18n="subtitle">Upload two images and overlay them to spot differences. The second image is semi-transparent by default.</p>
    </div>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="zh">中文</button>
    </div>
  </div>
</header>

<main class="app-main">
  <aside class="controls">
    <div class="uploader">
      <label class="upload-card" id="drop1">
        <input type="file" id="file1" accept="image/*" hidden />
        <div class="upload-inner">
          <div class="badge" data-i18n="layer1">Base · Image 1</div>
          <div class="hint" data-i18n="uploadHint">Click or drop an image here</div>
        </div>
      </label>
      <label class="upload-card" id="drop2">
        <input type="file" id="file2" accept="image/*" hidden />
        <div class="upload-inner">
          <div class="badge badge-top" data-i18n="layer2">Overlay · Image 2</div>
          <div class="hint" data-i18n="uploadHint2">Click or drop (semi-transparent by default)</div>
        </div>
      </label>
    </div>

    <div class="sliders">
      <div class="slider-group">
        <label for="opacity"><span data-i18n="opacity">Image 2 opacity</span> <span id="opacityVal">50%</span></label>
        <input type="range" id="opacity" min="0" max="100" value="50" />
      </div>
      <div class="slider-group">
        <label for="scale"><span data-i18n="scale">Image 2 scale</span> <span id="scaleVal">100%</span></label>
        <div class="scale-row">
          <button class="icon-btn" id="scaleMinus">−</button>
          <input type="range" id="scale" min="10" max="400" step="1" value="100" />
          <button class="icon-btn" id="scalePlus">+</button>
        </div>
      </div>
      <div class="slider-group">
        <label for="blend" data-i18n="blend">Blend mode</label>
        <select id="blend">
          <option value="normal" data-i18n="blend_normal">Normal</option>
          <option value="difference" data-i18n="blend_diff">Difference</option>
          <option value="multiply" data-i18n="blend_multiply">Multiply</option>
          <option value="screen" data-i18n="blend_screen">Screen</option>
          <option value="overlay" data-i18n="blend_overlay">Overlay</option>
          <option value="darken" data-i18n="blend_darken">Darken</option>
          <option value="lighten" data-i18n="blend_lighten">Lighten</option>
          <option value="exclusion" data-i18n="blend_exclusion">Exclusion</option>
        </select>
      </div>
      <div class="slider-group toggles">
        <button id="toggleVisible" class="btn active"><span data-i18n="visOn">👁 Show Image 2</span></button>
        <button id="toggleDrag" class="btn active"><span data-i18n="dragOn">✋ Drag: ON</span></button>
        <button id="fit" class="btn"><span data-i18n="fit">⤢ Fit</span></button>
        <button id="actual" class="btn"><span data-i18n="actual">1:1 Actual</span></button>
        <button id="matchBase" class="btn"><span data-i18n="matchBase">⇆ Match base</span></button>
        <button id="swap" class="btn"><span data-i18n="swap">⇅ Swap</span></button>
        <button id="clear" class="btn btn-danger"><span data-i18n="clear">✕ Clear</span></button>
      </div>
    </div>
  </aside>

  <section class="stage-wrap">
    <div class="stage" id="stage">
      <img id="img1" class="layer layer1" alt="" />
      <div id="frame2" class="frame">
        <img id="img2" class="layer layer2" alt="" />
        <span class="handle n"  data-dir="n"></span>
        <span class="handle s"  data-dir="s"></span>
        <span class="handle e"  data-dir="e"></span>
        <span class="handle w"  data-dir="w"></span>
        <span class="handle ne" data-dir="ne"></span>
        <span class="handle nw" data-dir="nw"></span>
        <span class="handle se" data-dir="se"></span>
        <span class="handle sw" data-dir="sw"></span>
      </div>
      <div class="placeholder" id="placeholder" data-i18n="placeholder">Please upload two images</div>
    </div>
    <p class="tip" data-i18n="tip">Tip: Drag Image 2 to move. Drag the handles to resize/stretch. Scroll wheel to zoom.</p>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
