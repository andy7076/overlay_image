<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>图片重叠对比工具</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
  <h1>图片重叠对比工具</h1>
  <p class="subtitle">上传两张图片，叠加查看差异。第二张默认半透明，便于比对。</p>
</header>

<main class="app-main">
  <section class="controls">
    <div class="uploader">
      <label class="upload-card" id="drop1">
        <input type="file" id="file1" accept="image/*" hidden />
        <div class="upload-inner">
          <div class="badge">底层 图片 1</div>
          <div class="hint">点击或拖拽上传</div>
        </div>
      </label>
      <label class="upload-card" id="drop2">
        <input type="file" id="file2" accept="image/*" hidden />
        <div class="upload-inner">
          <div class="badge badge-top">叠加 图片 2</div>
          <div class="hint">点击或拖拽上传（默认半透明）</div>
        </div>
      </label>
    </div>

    <div class="sliders">
      <div class="slider-group">
        <label for="opacity">图片 2 透明度 <span id="opacityVal">50%</span></label>
        <input type="range" id="opacity" min="0" max="100" value="50" />
      </div>
      <div class="slider-group">
        <label for="scale">图片 2 缩放 <span id="scaleVal">100%</span></label>
        <input type="range" id="scale" min="10" max="300" value="100" />
      </div>
      <div class="slider-group">
        <label for="blend">混合模式</label>
        <select id="blend">
          <option value="normal">正常</option>
          <option value="difference">差异 (Difference)</option>
          <option value="multiply">正片叠底</option>
          <option value="screen">滤色</option>
          <option value="overlay">叠加</option>
          <option value="darken">变暗</option>
          <option value="lighten">变亮</option>
          <option value="exclusion">排除</option>
        </select>
      </div>
      <div class="slider-group toggles">
        <button id="toggleDrag" class="btn">✋ 拖动图片 2: 开启</button>
        <button id="resetPos" class="btn">↺ 重置位置</button>
        <button id="swap" class="btn">⇅ 交换顺序</button>
        <button id="clear" class="btn btn-danger">✕ 清空</button>
      </div>
    </div>
  </section>

  <section class="stage-wrap">
    <div class="stage" id="stage">
      <img id="img1" class="layer layer1" alt="" />
      <img id="img2" class="layer layer2" alt="" />
      <div class="placeholder" id="placeholder">请先上传两张图片</div>
    </div>
    <p class="tip">提示：开启拖动后可用鼠标移动图片 2，滚轮调整缩放。</p>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
